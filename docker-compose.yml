services:
  app:
    build: .
    container_name: ecommerce_app
    restart: unless-stopped
    expose:
      - "80"   # Dokploy UI → connect to this container on port 80
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dokploy-network
      - ecommerce_net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ecommerce_phpmyadmin
    restart: unless-stopped
    expose:
      - "80"   # Dokploy UI → connect to this container on port 80
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dokploy-network
      - ecommerce_net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  db:
    image: mariadb:11.8.6
    container_name: ecommerce_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - ecommerce_net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db_data:

networks:
  dokploy-network:
    external: true
  ecommerce_net:
    driver: bridge
